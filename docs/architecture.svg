<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="820" viewBox="0 0 1440 820" role="img" aria-labelledby="title desc">
  <title id="title">Qwen CI Autopilot Architecture</title>
  <desc id="desc">Architecture diagram showing React frontend, Express orchestrator, local tools, Qwen Cloud, human checkpoint, Alibaba Cloud deployment, and health proof.</desc>
  <rect width="1440" height="820" fill="#ffffff"/>
  <text x="72" y="82" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800" fill="#12211f">Qwen CI Autopilot Architecture</text>
  <text x="72" y="118" font-family="Inter, Arial, sans-serif" font-size="17" fill="#61706c">Track 4 Autopilot Agent with Qwen Cloud reasoning and Alibaba Cloud deployment proof</text>

  <defs>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M 0 0 L 14 7 L 0 14 z" fill="#0b766e"/>
    </marker>
    <style>
      .box { fill: #fbfdfc; stroke: #dce7e4; stroke-width: 2; rx: 14; }
      .accent { fill: #eef8f6; stroke: #9ed3cb; stroke-width: 2; rx: 14; }
      .warn { fill: #fff7ed; stroke: #efc28e; stroke-width: 2; rx: 14; }
      .cloud { fill: #f3f8fd; stroke: #c7d8ea; stroke-width: 2; rx: 14; }
      .title { font: 800 20px Inter, Arial, sans-serif; fill: #142321; }
      .body { font: 500 15px Inter, Arial, sans-serif; fill: #63716d; }
      .mono { font: 700 14px Consolas, monospace; fill: #0b665e; }
      .line { stroke: #0b766e; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="box" x="72" y="200" width="250" height="120"/>
  <text class="title" x="100" y="244">Developer</text>
  <text class="body" x="100" y="276">CI failure, coverage gate,</text>
  <text class="body" x="100" y="300">or production alert</text>

  <rect class="box" x="416" y="190" width="278" height="140"/>
  <text class="title" x="444" y="235">React Dashboard</text>
  <text class="body" x="444" y="268">Scenario input, agent run,</text>
  <text class="body" x="444" y="292">evidence report, approval UI</text>
  <text class="mono" x="444" y="316">src/App.tsx</text>

  <rect class="accent" x="790" y="176" width="310" height="168"/>
  <text class="title" x="818" y="222">Express Orchestrator</text>
  <text class="body" x="818" y="255">Five staged agents with</text>
  <text class="body" x="818" y="279">structured JSON contracts</text>
  <text class="mono" x="818" y="306">server/orchestrator.ts</text>

  <rect class="box" x="416" y="470" width="278" height="150"/>
  <text class="title" x="444" y="516">Local Tool Layer</text>
  <text class="body" x="444" y="549">Log parser, file detector,</text>
  <text class="body" x="444" y="573">command planner, risk signals</text>
  <text class="mono" x="444" y="600">server/localTools.ts</text>

  <rect class="cloud" x="790" y="470" width="310" height="150"/>
  <text class="title" x="818" y="516">Qwen Cloud</text>
  <text class="body" x="818" y="549">OpenAI-compatible chat API</text>
  <text class="mono" x="818" y="578">qwen3.7-plus</text>
  <text class="mono" x="818" y="602">DASHSCOPE_API_KEY</text>

  <rect class="warn" x="1184" y="192" width="190" height="140"/>
  <text class="title" x="1212" y="238">Human Gate</text>
  <text class="body" x="1212" y="271">Required before</text>
  <text class="body" x="1212" y="295">high-risk patches</text>

  <rect class="cloud" x="1138" y="470" width="236" height="150"/>
  <text class="title" x="1166" y="516">Alibaba Cloud</text>
  <text class="body" x="1166" y="549">Function Compute</text>
  <text class="body" x="1166" y="573">custom container</text>
  <text class="mono" x="1166" y="600">/api/health</text>

  <path class="line" d="M322 260 H408"/>
  <path class="line" d="M694 260 H782"/>
  <path class="line" d="M945 344 V462"/>
  <path class="line" d="M790 545 H704"/>
  <path class="line" d="M1100 260 H1176"/>
  <path class="line" d="M1100 545 H1130"/>
  <path class="line" d="M555 330 V462"/>

  <rect x="72" y="690" width="1302" height="54" rx="12" fill="#f7faf9" stroke="#dce7e4"/>
  <text x="98" y="724" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#142321">Devpost proof path:</text>
  <text x="260" y="724" font-family="Consolas, monospace" font-size="15" fill="#0b665e">deploy/alibaba/serverless-devs.yaml -> Alibaba Cloud Function Compute -> GET /api/health</text>
</svg>
