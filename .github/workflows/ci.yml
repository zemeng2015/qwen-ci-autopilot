name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify:
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build

      - name: Start local API
        shell: pwsh
        run: |
          $process = Start-Process -FilePath node -ArgumentList "dist-server/index.js" -PassThru -WindowStyle Hidden
          $process.Id | Out-File -FilePath server.pid -Encoding utf8
          $deadline = (Get-Date).AddSeconds(30)
          do {
            try {
              $health = Invoke-RestMethod -Uri "http://127.0.0.1:8787/api/health" -TimeoutSec 3
              if ($health.ok) {
                Write-Host "API ready."
                exit 0
              }
            }
            catch {
              Start-Sleep -Seconds 2
            }
          } while ((Get-Date) -lt $deadline)
          throw "API did not become ready in time."

      - name: Hackathon audit
        shell: pwsh
        run: powershell -NoProfile -ExecutionPolicy Bypass -File ./scripts/qwencloud-hackathon-audit.ps1 -BaseUrl http://127.0.0.1:8787 -SkipDraft

      - name: Upload hackathon proof artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: qwencloud-proof
          path: artifacts/qwencloud-proof/
          if-no-files-found: warn

      - name: Stop local API
        if: always()
        shell: pwsh
        run: |
          if (Test-Path server.pid) {
            $pidValue = Get-Content server.pid -Raw
            Stop-Process -Id ([int]$pidValue) -ErrorAction SilentlyContinue
          }
